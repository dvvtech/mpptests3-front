<body>
    <div id="settings"></div>
    <div id="coloring" class="hidden"></div>

    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 flex flex-col items-center">

    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadComponent(id, file) {
            const response = await fetch(file);
            const content = await response.text();
            document.getElementById(id).innerHTML = content;
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponent("settings", "settings.html").then(() => {
                if (typeof initSettings === 'function') {
                    initSettings();
                }
            });
            loadComponent("coloring", "coloring.html").then(() => {
                if (typeof initColoring === 'function') {
                    initColoring();
                }
            });
        });
    </script>
