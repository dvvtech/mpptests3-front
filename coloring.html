<div class="min-h-screen bg-gray-100 flex flex-col">
    <div class="bg-white shadow-md p-2 md:p-3">
        <div class="flex flex-wrap items-center gap-2 md:gap-3 justify-center">
            <button id="btn-home" class="flex items-center gap-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Главная">
                <i class="fas fa-home"></i>
                <span class="hidden md:inline">Главная</span>
            </button>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div id="color-palette" class="flex flex-wrap gap-1">
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-2">
                <label class="text-sm text-gray-600 hidden md:inline">Кисть:</label>
                <input type="range" id="brush-size" min="5" max="50" value="15" class="w-20 md:w-32">
                <span id="brush-size-value" class="text-sm text-gray-600 w-8">15</span>
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-1">
                <button id="btn-rotate-left" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Повернуть влево">
                    <i class="fas fa-undo"></i>
                </button>
                <button id="btn-rotate-right" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Повернуть вправо">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-1">
                <button id="btn-zoom-out" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Уменьшить">
                    <i class="fas fa-search-minus"></i>
                </button>
                <span id="zoom-level" class="text-sm text-gray-600 w-12 text-center">100%</span>
                <button id="btn-zoom-in" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Увеличить">
                    <i class="fas fa-search-plus"></i>
                </button>
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-1">
                <button id="btn-undo" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed" title="Отменить" disabled>
                    <i class="fas fa-reply"></i>
                </button>
                <button id="btn-redo" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed" title="Повторить" disabled>
                    <i class="fas fa-share"></i>
                </button>
            </div>
            
            <button id="btn-pan" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Перемещение">
                <i class="fas fa-hand-paper"></i>
            </button>
            
            <button id="btn-center" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Центрировать">
                <i class="fas fa-compress-arrows-alt"></i>
            </button>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <button id="btn-calculate" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg transition" title="Рассчитать">
                <i class="fas fa-calculator mr-1"></i>
                <span class="hidden md:inline">Рассчитать</span>
            </button>
            
            <button id="btn-clear" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition" title="Очистить">
                <i class="fas fa-trash mr-1"></i>
                <span class="hidden md:inline">Очистить</span>
            </button>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="canvas-container">
        <div class="relative" id="canvas-wrapper">
            <canvas id="coloring-canvas" width="785" height="1080"></canvas>
            <div id="image-loading" class="absolute inset-0 bg-gray-200 flex items-center justify-center hidden">
                <i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i>
            </div>
        </div>
    </div>

    <div id="results-panel" class="hidden fixed bottom-0 left-0 right-0 bg-white shadow-lg p-4 md:p-6 z-40 max-h-[60vh] overflow-y-auto">
        <div class="max-w-2xl mx-auto">
            <div class="flex-1">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Результаты анализа</h3>
                
                <div id="color-stats" class="mb-4">
                    <h4 class="font-semibold text-gray-700 mb-2">Статистика цветов:</h4>
                    <div id="color-bars"></div>
                </div>
                
                <div id="analysis-results">
                    <h4 class="font-semibold text-gray-700 mb-2">Характеристика:</h4>
                    <p id="main-characteristic" class="text-gray-600 mb-3"></p>
                    
                    <h4 class="font-semibold text-gray-700 mb-2">Сильные стороны:</h4>
                    <p id="strengths" class="text-gray-600 mb-3"></p>
                    
                    <h4 class="font-semibold text-gray-700 mb-2">Рекомендации:</h4>
                    <p id="recommendations" class="text-gray-600 mb-4"></p>
                </div>
                
                <button id="btn-send-email" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition mb-3">
                    <i class="fas fa-envelope mr-2"></i>Отправить результаты на почту
                </button>
            </div>
            <button id="btn-close-results" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg transition">
                Закрыть результаты
            </button>
        </div>
    </div>
</div>
