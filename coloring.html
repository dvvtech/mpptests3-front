<div id="coloring-page" class="min-h-screen bg-gray-100 flex flex-col">
    <div id="test-header" class="bg-white shadow-sm px-4 py-2 border-b border-gray-200">
        <h1 id="test-title" class="text-center text-base font-semibold text-gray-800">
            <i class="fas fa-palette text-blue-400 mr-2"></i>
            <span id="test-name">Выберите тест</span>
        </h1>
    </div>
    <div id="email-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Отправка результатов на почту</h3>
            <div class="mb-4">
                <label for="email-input" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email-input" placeholder="example@mail.com"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                <p id="email-error" class="text-red-500 text-xs mt-1 hidden">Введите корректный email</p>
            </div>
            <div id="email-sending" class="hidden text-center py-2">
                <i class="fas fa-spinner fa-spin text-blue-500"></i>
                <span class="text-sm text-gray-600 ml-2">Отправка...</span>
            </div>
            <div id="email-success" class="hidden text-green-600 text-sm text-center py-2">
                <i class="fas fa-check-circle"></i> Результаты успешно отправлены!
            </div>
            <div class="flex gap-3 mt-4">
                <button id="btn-send-email-confirm" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg font-medium hover:bg-blue-600 transition">
                    Отправить
                </button>
                <button id="btn-send-email-cancel" class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition">
                    Отмена
                </button>
            </div>
        </div>
    </div>
    <div id="toolbar" class="bg-white shadow-md p-2 md:p-3">
        <div class="flex flex-wrap items-center gap-2 md:gap-3 justify-center">
            <button id="btn-home" class="flex items-center gap-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Главная">
                <i class="fas fa-home"></i>
                <span class="hidden md:inline">Главная</span>
            </button>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div id="color-palette" class="flex flex-wrap gap-1.5">
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-2">
                <label class="text-sm text-gray-600 hidden md:inline">Кисть:</label>
                <input type="range" id="brush-size" min="1" max="50" value="15" class="w-20 md:w-32">
                <span id="brush-size-value" class="text-sm text-gray-600 w-8">15</span>
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-1">
                <button id="btn-rotate-left" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Повернуть влево">
                    <i class="fas fa-undo"></i>
                </button>
                <button id="btn-rotate-right" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Повернуть вправо">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
            
            <div class="flex items-center gap-1">
                <button id="btn-zoom-out" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Уменьшить">
                    <i class="fas fa-search-minus"></i>
                </button>
                <span id="zoom-level" class="text-sm text-gray-600 w-12 text-center">100%</span>
                <button id="btn-zoom-in" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Увеличить">
                    <i class="fas fa-search-plus"></i>
                </button>
            </div>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <div class="flex items-center gap-1">
                <button id="btn-undo" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed" title="Отменить" disabled>
                    <i class="fas fa-reply"></i>
                </button>
                <button id="btn-redo" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed" title="Повторить" disabled>
                    <i class="fas fa-share"></i>
                </button>
            </div>
            
            <button id="btn-pan" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Перемещение">
                <i class="fas fa-hand-paper"></i>
            </button>
            
            <button id="btn-center" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition" title="Центрировать">
                <i class="fas fa-compress-arrows-alt"></i>
            </button>
            
            <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
            
            <button id="btn-calculate" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg transition" title="Рассчитать">
                <i class="fas fa-calculator mr-1"></i>
                <span class="hidden md:inline">Рассчитать</span>
            </button>
            
            <button id="btn-clear" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition" title="Очистить">
                <i class="fas fa-trash mr-1"></i>
                <span class="hidden md:inline">Очистить</span>
            </button>
        </div>
    </div>

    <div id="work-area" class="flex-1 flex overflow-hidden">
        <div class="flex-1 flex items-center justify-center overflow-hidden p-4" id="canvas-container">
            <div class="relative" id="canvas-wrapper">
                <canvas id="coloring-canvas" width="785" height="1080"></canvas>
                <div id="image-loading" class="absolute inset-0 bg-gray-200 flex items-center justify-center hidden">
                    <i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i>
                </div>
            </div>
        </div>

        <div id="results-panel" class="hidden flex-col">
            <div class="px-4 py-3 border-b border-gray-100 bg-gray-50 flex items-center justify-between flex-shrink-0">
                <h2 class="font-semibold text-gray-800 text-sm flex items-center gap-2">
                    <i class="fas fa-chart-pie text-blue-400"></i>
                    Результаты анализа
                </h2>
                <button id="btn-close-results" class="text-gray-400 hover:text-gray-600 transition" title="Скрыть">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="results-scroll" class="flex-1 overflow-y-auto p-4"></div>
        </div>
    </div>
</div>
